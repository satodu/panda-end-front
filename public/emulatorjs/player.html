<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panda End Player</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            overflow: hidden;
        }
        #emulator {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="emulator"></div>

    <script>
        // Parse query parameters
        const urlParams = new URLSearchParams(window.location.search);
        const romUrl = urlParams.get('rom');
        const core = urlParams.get('core');
        const title = urlParams.get('title');

        if (romUrl && core) {
            window.EJS_player = '#emulator';
            window.EJS_core = core;
            window.EJS_gameName = decodeURIComponent(title) || 'Retro Game';
            window.EJS_color = '#a855f7';
            window.EJS_startOnLoaded = true;
            window.EJS_pathtodata = '/emulatorjs/';
            window.EJS_gameUrl = decodeURIComponent(romUrl);
            window.EJS_AdUrl = '';

            // Load the loader script
            const script = document.createElement('script');
            script.src = '/emulatorjs/loader.js';
            document.body.appendChild(script);
        } else {
            document.body.innerHTML = '<div style="color: white; text-align: center; padding-top: 20%; font-family: sans-serif;">Erro: Parâmetros de ROM ou Core inválidos.</div>';
        }
    </script>
</body>
</html>
